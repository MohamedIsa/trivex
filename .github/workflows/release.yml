name: Release APK

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── Firebase credentials ──────────────────────────────────────────
      # To set up: base64 -i android/app/google-services.json | pbcopy
      # Then add as GitHub secret: GOOGLE_SERVICES_JSON
      - name: Write google-services.json
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivex-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
